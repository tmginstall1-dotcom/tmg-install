name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'capacitor.config.ts'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licences
        run: yes | sdkmanager --licenses || true

      - name: Install required SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Update Java compatibility to 21 (re-apply after sync)
        run: |
          sed -i 's/VERSION_17/VERSION_21/g' android/app/capacitor.build.gradle
          sed -i 's/VERSION_17/VERSION_21/g' android/app/build.gradle

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tmg-staff-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
