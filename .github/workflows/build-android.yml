name: Build Android APK & AAB

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'client/**'
      - 'shared/**'
      - 'capacitor.config.ts'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build web bundle (Vite)
        run: npm run build
        env:
          VITE_API_BASE: https://tmg-install-project--tmginstall.replit.app

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licences
        run: yes | sdkmanager --licenses || true

      - name: Install required SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Update Java compatibility to 21 (re-apply after sync)
        run: |
          sed -i 's/VERSION_17/VERSION_21/g' android/app/capacitor.build.gradle || true
          sed -i 's/VERSION_17/VERSION_21/g' android/app/build.gradle || true

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      # ── Debug APK (always built — no secrets needed) ─────────────────────────

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: tmg-staff-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── Release AAB (Play Store) — requires keystore secrets ─────────────────

      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/tmg-staff-release.keystore

      - name: Build Release AAB (Android App Bundle for Play Store)
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/tmg-staff-release.keystore

      - name: Upload Release AAB
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: tmg-staff-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Build Release APK (signed — for direct install)
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/tmg-staff-release.keystore

      - name: Upload Signed Release APK
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: tmg-staff-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      # ── Publish APK to GitHub Releases (permanent public download link) ───────

      - name: Publish APK as latest GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use signed APK if available, otherwise fall back to debug build
          if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            APK="android/app/build/outputs/apk/release/app-release.apk"
            LABEL="TMG Install (signed)"
          else
            APK="android/app/build/outputs/apk/debug/app-debug.apk"
            LABEL="TMG Install (debug)"
          fi

          BUILD_NUM=$(git rev-list --count HEAD)
          COMMIT=$(git rev-parse --short HEAD)

          # Remove previous latest-build release + tag so we can recreate it
          gh release delete latest-build --yes 2>/dev/null || true
          git push --delete origin latest-build 2>/dev/null || true

          # Create fresh release — URL is always the same after each build
          gh release create latest-build \
            --title "${LABEL} — Build #${BUILD_NUM}" \
            --notes "**TMG Install Staff App — Build #${BUILD_NUM}** (\`${COMMIT}\`)

          Tap the link below on your Android device to download and install the app.

          > Enable **Install unknown apps** in Android settings if prompted." \
            "${APK}#tmg-install.apk"
