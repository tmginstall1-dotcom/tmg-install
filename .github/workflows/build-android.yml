name: Build Android APK & AAB

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'client/**'
      - 'shared/**'
      - 'capacitor.config.ts'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build web bundle (Vite)
        run: npm run build
        env:
          VITE_API_BASE: https://tmginstall.com

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licences
        run: yes | sdkmanager --licenses || true

      - name: Install required SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Update Java compatibility to 21 (re-apply after sync)
        run: |
          sed -i 's/VERSION_17/VERSION_21/g' android/app/capacitor.build.gradle
          sed -i 's/VERSION_17/VERSION_21/g' android/app/build.gradle

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      # ── Debug APK (always built — no secrets needed) ─────────────────────────

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: tmg-staff-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── Release AAB (Play Store) — requires keystore secrets ─────────────────

      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/tmg-staff-release.keystore

      - name: Build Release AAB (Android App Bundle for Play Store)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/tmg-staff-release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

      - name: Upload Release AAB
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: tmg-staff-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Build Release APK (signed — for direct install)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/tmg-staff-release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

      - name: Upload Signed Release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: tmg-staff-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90
