<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-18012639714"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'AW-18012639714');
    </script>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="TMG Staff" />
    <meta name="theme-color" content="#000000" />
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
    <!-- Only load the fonts actually used: Inter (body) + Teko/Oswald (headings) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@500;600;700&family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Instant splash screen — visible before JS loads -->
    <style>
      html, body { margin: 0; padding: 0; background: #020617; overflow-x: hidden; }
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #020617;
        gap: 20px;
      }
      #splash-logo {
        font-family: 'Teko', 'Oswald', Arial, sans-serif;
        font-size: 28px; font-weight: 700; letter-spacing: 0.08em;
        color: #fff; text-transform: uppercase;
      }
      #splash-logo span { color: #7c3aed; }
      #splash-spinner {
        width: 36px; height: 36px;
        border: 3px solid rgba(124,58,237,0.3);
        border-top-color: #7c3aed;
        border-radius: 50%;
        animation: spin 0.75s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- Splash shown instantly, hidden when React mounts -->
    <div id="splash">
      <div id="splash-logo">TMG <span>Install</span></div>
      <div id="splash-spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
